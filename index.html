<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>VITA - Sua vida organizada</title>
<style>
:root{--bg:#fbf7ff;--card:#fff;--text:#241933;--muted:#756a82;--primary:#6d28d9;--primary2:#4c1d95;--soft:#eadcff;--line:#e7d7ff;--ok:#dcfce7;--bad:#fee2e2;--warn:#fef3c7;--shadow:0 20px 60px rgba(45,22,74,.10);--radius:28px}
[data-theme="cafe"]{--bg:#f7efe6;--card:#fffdf8;--text:#2b211b;--muted:#7a6658;--primary:#7b4b2a;--primary2:#4b2e1b;--soft:#ead8c6;--line:#dec7b3}
[data-theme="areia"]{--bg:#fbf4e6;--card:#fffef9;--text:#30271d;--muted:#81705c;--primary:#b7791f;--primary2:#744210;--soft:#f3e3bd;--line:#ecd39b}
[data-theme="salvia"]{--bg:#f3f7f1;--card:#ffffff;--text:#1f2a22;--muted:#637061;--primary:#59745a;--primary2:#2f4a34;--soft:#dfeade;--line:#cfddcf}
[data-theme="neve"]{--bg:#f8fafc;--card:#fff;--text:#111827;--muted:#64748b;--primary:#334155;--primary2:#0f172a;--soft:#e2e8f0;--line:#e5e7eb}
[data-theme="escuro"]{--bg:#131018;--card:#201a29;--text:#fff;--muted:#c7bcd4;--primary:#c4a484;--primary2:#8b6848;--soft:#34283f;--line:#4a3a58;--shadow:0 20px 60px rgba(0,0,0,.25)}
*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)}button,input,select,textarea{font:inherit}button{cursor:pointer;border:0}.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.side{background:linear-gradient(180deg,var(--primary),var(--primary2));color:#fff;padding:28px;position:sticky;top:0;height:100vh;overflow:auto}.logoIcon{width:56px;height:56px;border-radius:18px;background:rgba(255,255,255,.16);display:grid;place-items:center;font-size:31px;font-weight:900}.brand{font-size:42px;font-weight:900;letter-spacing:6px;margin:20px 0 6px}.tag{font-size:14px;font-weight:800;letter-spacing:3px;opacity:.86;text-transform:uppercase}.desc{line-height:1.35;margin:18px 0 26px;opacity:.9}.nav{display:flex;flex-direction:column;gap:8px}.nav button{background:transparent;color:#fff;text-align:left;padding:13px 14px;border-radius:16px;font-weight:800;opacity:.85}.nav button.active,.nav button:hover{background:rgba(255,255,255,.16);opacity:1}.main{padding:38px;min-width:0}.top{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:24px}.title{font-size:44px;color:var(--primary);font-weight:900;margin:0}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{background:var(--primary);color:#fff;border-radius:18px;padding:13px 18px;font-weight:900}.btn.soft{background:var(--soft);color:var(--primary)}.btn.ghost{background:transparent;border:2px solid var(--line);color:var(--text)}.btn.danger{background:#dc2626;color:#fff}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:18px}.card{background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow)}.span3{grid-column:span 3}.span4{grid-column:span 4}.span5{grid-column:span 5}.span6{grid-column:span 6}.span7{grid-column:span 7}.span8{grid-column:span 8}.span12{grid-column:span 12}.kicker{color:var(--muted);font-weight:800;text-transform:uppercase;font-size:12px;letter-spacing:1px}.big{font-size:32px;font-weight:950;margin:8px 0}.muted{color:var(--muted)}.list{display:flex;flex-direction:column;gap:12px}.item{display:flex;gap:12px;align-items:flex-start;justify-content:space-between;padding:14px;border-radius:18px;background:var(--bg);border:1px solid var(--line)}.item .left{display:flex;gap:12px;align-items:flex-start}.check{width:26px;height:26px;border-radius:9px;border:2px solid var(--primary);display:grid;place-items:center;color:#fff;flex:0 0 auto}.done .check{background:var(--primary)}.done .txt{text-decoration:line-through;color:var(--muted)}.pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;background:var(--soft);color:var(--primary);font-weight:900;padding:8px 12px;font-size:13px}.pill.ok{background:#dcfce7;color:#166534}.pill.bad{background:#fee2e2;color:#991b1b}.pill.warn{background:#ffedd5;color:#9a3412}.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}.field{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}.field label{font-size:12px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);font-weight:900}.field input,.field select,.field textarea{width:100%;border:1.5px solid var(--line);border-radius:18px;background:var(--card);color:var(--text);padding:14px;outline:none}.field textarea{min-height:110px;resize:vertical}.modal{position:fixed;inset:0;background:rgba(21,15,31,.55);display:none;align-items:center;justify-content:center;padding:20px;z-index:10}.modal.open{display:flex}.box{background:var(--card);border-radius:30px;max-width:980px;width:100%;max-height:90vh;overflow:auto;padding:28px;border:1px solid var(--line)}.boxHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.dayName{text-align:center;font-weight:900;color:var(--muted);font-size:12px}.day{min-height:86px;border-radius:18px;border:1px solid var(--line);background:var(--card);padding:10px;font-weight:900}.day.today{outline:3px solid var(--primary)}.dot{width:7px;height:7px;background:var(--primary);border-radius:50%;display:inline-block;margin:3px 2px}.dot.money{background:#dc2626}.dot.health{background:#e11d48}.dot.case{background:#2563eb}.monthbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.tabs{display:flex;gap:10px;overflow-x:auto;padding-bottom:10px;scrollbar-color:var(--primary) var(--soft)}.tab{white-space:nowrap;background:var(--card);border:2px solid var(--line);border-radius:999px;padding:12px 18px;font-weight:900;color:var(--text)}.tab.active{border-color:var(--primary);color:var(--primary);background:var(--soft)}.petHero{background:linear-gradient(180deg,var(--soft),var(--card));border-radius:30px;padding:24px;text-align:center}.avatar{width:150px;height:150px;border-radius:42px;border:7px solid var(--primary);background:#fff;object-fit:cover;display:inline-grid;place-items:center;font-size:62px;overflow:hidden}.avatar img{width:100%;height:100%;object-fit:cover}.petCard{display:flex;gap:16px;align-items:center}.petCard .avatar{width:82px;height:82px;border-radius:26px;border-width:4px;font-size:35px}.noteBlock{border-left:7px solid var(--primary);background:var(--card);border-radius:22px;padding:16px;border-top:1px solid var(--line);border-right:1px solid var(--line);border-bottom:1px solid var(--line)}.themePick{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.themeBtn{border:2px solid var(--line);background:var(--card);border-radius:18px;padding:14px;font-weight:900;color:var(--text)}.ata{white-space:pre-line;background:var(--bg);border:1px dashed var(--primary);border-radius:18px;padding:16px;line-height:1.55}.hide{display:none!important}@media(max-width:900px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.main{padding:22px}.span3,.span4,.span5,.span6,.span7,.span8{grid-column:span 12}.title{font-size:34px}.top{align-items:flex-start;flex-direction:column}.calendar{gap:5px}.day{min-height:66px;padding:8px}.brand{font-size:36px}.themePick{grid-template-columns:1fr 1fr}}
</style>
</head>
<body data-theme="cafe">
<div class="app">
  <aside class="side">
    <div class="logoIcon">✓</div>
    <div class="brand">VITA</div>
    <div class="tag">Sua vida organizada</div>
    <p class="desc">Agenda física + complemento digital para pendências, contas, pets, saúde, reclamações, notas e rotina.</p>
    <nav class="nav" id="nav"></nav>
  </aside>
  <main class="main">
    <div class="top"><h1 class="title" id="pageTitle">Painel</h1><div class="actions"><button class="btn soft" onclick="exportData()">Exportar</button><button class="btn" onclick="openQuick()">Adicionar</button></div></div>
    <section id="view"></section>
  </main>
</div>
<div class="modal" id="modal"><div class="box"><div class="boxHead"><h2 id="modalTitle">Adicionar</h2><button class="btn soft" onclick="closeModal()">Fechar</button></div><div id="modalBody"></div></div></div>
<script>
const LS='vita_completo_base_bege_v2';
const months=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
const today=new Date(); let currentMonth=today.getMonth(), currentYear=today.getFullYear(), activePetId=null, petTab='saude', healthTab='agenda', activeHealthId=1, complaintTab='painel';
function iso(d){return d.toISOString().slice(0,10)}
function money(v){return (Number(v)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function safe(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
const defaultData={theme:'cafe',settings:{caps:true,whatsHusband:'',whatsMom:''},tasks:[{id:1,title:'Testar o VITA completo',date:iso(today),cat:'Pessoal',done:false,priority:true}],bills:[],momBills:[],notes:[{id:1,title:'Ideias',tag:'Geral',text:'Adicionar aqui tudo que lembrar durante o dia.'}],pets:[{id:1,name:'Max',species:'Cachorro',sex:'Macho',birth:'',weight:'',food:'',vet:'',photo:'',notes:'',events:[],album:[]},{id:2,name:'Cadu',species:'Cachorro',sex:'Macho',birth:'',weight:'',food:'',vet:'',photo:'',notes:'',events:[],album:[]}],files:[],health:{people:[{id:1,name:'Thayná',type:'Eu',notes:''},{id:2,name:'Marido',type:'Marido',notes:''}],records:[]},complaints:{people:[{id:1,nome:'Thayná Santos',vinculo:'Eu',telefone:'',doc:''},{id:2,nome:'Mãe',vinculo:'Familiar',telefone:'',doc:''},{id:3,nome:'Marido',vinculo:'Cônjuge',telefone:'',doc:''}],cases:[{id:1,titularId:1,empresa:'Shopee',assunto:'Produto com problema',portal:'Reclame Aqui',status:'Aguardando',prazo:'Revisar',valor:0,data:'',protocolo:'',resumo:'Caso de teste para organizar provas, linha do tempo, portais e ata.'}],events:[{id:1,caseId:1,data:iso(today),titulo:'Caso criado',desc:'Primeiro registro da linha do tempo.'}],evidence:[],portals:[]}};
function merge(base,obj){for(const k in obj){if(obj[k]&&typeof obj[k]=='object'&&!Array.isArray(obj[k])){base[k]=merge(base[k]||{},obj[k])}else base[k]=obj[k]}return base}
function load(){try{return merge(structuredClone(defaultData),JSON.parse(localStorage.getItem(LS)||'{}'))}catch(e){return structuredClone(defaultData)}}
let data=load();
function save(){localStorage.setItem(LS,JSON.stringify(data))}
function cap(s){if(!data.settings.caps||!s)return s;return String(s).toLowerCase().replace(/(^\s*[a-záéíóúâêôãõç])|([.!?]\s*[a-záéíóúâêôãõç])|(\n\s*[a-záéíóúâêôãõç])/g,m=>m.toUpperCase()).replace(/\b(vita|max|cadu|thayná|thayna|certiva|borges)\b/gi,m=>({vita:'VITA',max:'Max',cadu:'Cadu','thayná':'Thayná',thayna:'Thayná',certiva:'Certiva',borges:'Borges'}[m.toLowerCase()]||m));}
function bindCaps(root=document){root.querySelectorAll('input[type=text],textarea').forEach(el=>{el.addEventListener('blur',()=>{el.value=cap(el.value)})})}
const pages=[['painel','🏠 Painel'],['pendencias','✅ Pendências'],['financeiro','💰 Financeiro'],['pets','🐶 Pets'],['saude','❤️ Saúde'],['reclamacoes','⚖️ Reclamações'],['notas','📝 Notas'],['arquivos','📂 Arquivos'],['relatorios','📊 Relatórios'],['config','⚙️ Configurações']];let page='painel';
function renderNav(){nav.innerHTML=pages.map(p=>`<button class="${page==p[0]?'active':''}" onclick="go('${p[0]}')">${p[1]}</button>`).join('')}
function go(p){page=p;render()}
function render(){document.body.dataset.theme=data.theme||'cafe';renderNav(); pageTitle.textContent=pages.find(x=>x[0]==page)?.[1].replace(/^.. /,'')||'Painel'; const map={painel,pendencias,financeiro,pets,saude,reclamacoes,notas,arquivos,relatorios,config}; view.innerHTML=map[page](); bindCaps(view); save()}
function painel(){const openBills=[...data.bills,...data.momBills].filter(b=>!b.paid); let upcomingHealth=data.health.records.filter(r=>r.date && r.date>=iso(today)).sort((a,b)=>a.date.localeCompare(b.date)); return `<div class="grid"><div class="card span3"><div class="kicker">Pendências abertas</div><div class="big">${data.tasks.filter(t=>!t.done).length}</div><button class="btn soft" onclick="go('pendencias')">Ver</button></div><div class="card span3"><div class="kicker">Contas abertas</div><div class="big">${money(openBills.reduce((s,b)=>s+Number(b.value||0),0))}</div><button class="btn soft" onclick="go('financeiro')">Ver</button></div><div class="card span3"><div class="kicker">Pets cadastrados</div><div class="big">${data.pets.length}</div><button class="btn soft" onclick="go('pets')">Ver</button></div><div class="card span3"><div class="kicker">Saúde agendada</div><div class="big">${upcomingHealth.length}</div><button class="btn soft" onclick="go('saude')">Ver</button></div><div class="card span7"><div class="monthbar"><h2>Calendário — ${months[currentMonth]} de ${currentYear}</h2><div><button class="btn soft" onclick="shiftMonth(-1)">‹</button> <button class="btn soft" onclick="shiftMonth(1)">›</button></div></div>${calendarHtml()}</div><div class="card span5"><h2>Hoje e próximos</h2><div class="list">${data.tasks.filter(t=>!t.done).slice(0,7).map(taskItem).join('')||'<p class="muted">Nenhuma pendência.</p>'}</div></div><div class="card span6"><h2>Pets</h2><div class="list">${data.pets.map(petMini).join('')}</div></div><div class="card span6"><h2>Saúde</h2><div class="list">${upcomingHealth.slice(0,4).map(healthItem).join('')||'<p class="muted">Nenhum compromisso de saúde.</p>'}</div></div><div class="card span6"><h2>Reclamações recentes</h2><div class="list">${data.complaints.cases.slice(0,4).map(c=>`<div class="item"><div><b>${safe(c.empresa)}</b><br><span class="muted">${safe(c.assunto)} • ${safe(c.status)}</span></div></div>`).join('')}</div></div><div class="card span6"><h2>Notas rápidas</h2><div class="list">${data.notes.slice(0,3).map(n=>`<div class="noteBlock"><b>${safe(n.title)}</b><p class="muted">${safe(n.text)}</p></div>`).join('')}</div></div></div>`}
function shiftMonth(n){currentMonth+=n;if(currentMonth<0){currentMonth=11;currentYear--}if(currentMonth>11){currentMonth=0;currentYear++}render()}
function calendarHtml(){let first=new Date(currentYear,currentMonth,1),start=first.getDay(),days=new Date(currentYear,currentMonth+1,0).getDate();let html='<div class="calendar">'+['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map(d=>`<div class="dayName">${d}</div>`).join('');for(let i=0;i<start;i++)html+='<div></div>';for(let d=1;d<=days;d++){let date=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;let dots='';if(data.tasks.some(t=>t.date==date)) dots+='<span class="dot"></span>';if([...data.bills,...data.momBills].some(b=>b.due==date||b.paidDate==date)) dots+='<span class="dot money"></span>';if(data.health.records.some(r=>r.date==date)) dots+='<span class="dot health"></span>';if(data.complaints.events.some(e=>e.data==date)) dots+='<span class="dot case"></span>';if(data.pets.flatMap(p=>p.events||[]).some(e=>e.date==date)) dots+='<span class="dot"></span>';html+=`<div class="day ${date==iso(today)?'today':''}" onclick="openDay('${date}')">${d}<br>${dots}</div>`}return html+'</div>'}
function taskItem(t){return `<div class="item ${t.done?'done':''}"><div class="left"><button class="check" onclick="toggleTask(${t.id})">${t.done?'✓':''}</button><div><b class="txt">${safe(t.title)}</b><div class="muted">${safe(t.date||'Sem data')} • ${safe(t.cat||'Geral')}</div></div></div><button class="btn soft" onclick="delTask(${t.id})">Excluir</button></div>`}
function pendencias(){return `<div class="card"><div class="row" style="justify-content:space-between"><h2>Pendências</h2><button class="btn" onclick="openTask()">Nova pendência</button></div><div class="list">${data.tasks.map(taskItem).join('')||'<p class="muted">Nenhuma pendência.</p>'}</div></div>`}
function toggleTask(id){let t=data.tasks.find(x=>x.id==id);t.done=!t.done;render()} function delTask(id){data.tasks=data.tasks.filter(t=>t.id!=id);render()}
function billItem(b,type){return `<div class="item ${b.paid?'done':''}"><div><b>${safe(b.name)}</b><div class="muted">${safe(b.due||'Sem vencimento')} • ${money(b.value)} • ${type=='mom'?'Conta mãe':'Minha conta'}</div>${b.obs?`<div class="muted">${safe(b.obs)}</div>`:''}</div><div class="row"><button class="btn soft" onclick="payBill(${b.id},'${type}')">${b.paid?'Paga':'Marcar paga'}</button><button class="btn soft" onclick="delBill(${b.id},'${type}')">Excluir</button></div></div>`}
function financeiro(){let open=data.bills.filter(b=>!b.paid).reduce((s,b)=>s+Number(b.value||0),0), mom=data.momBills.filter(b=>!b.paid).reduce((s,b)=>s+Number(b.value||0),0);return `<div class="grid"><div class="card span6"><div class="row" style="justify-content:space-between"><h2>Minhas contas</h2><button class="btn" onclick="openBill('me')">Nova conta</button></div><p class="pill">Aberto: ${money(open)}</p><div class="list">${data.bills.map(b=>billItem(b,'me')).join('')||'<p class="muted">Nenhuma conta.</p>'}</div></div><div class="card span6"><div class="row" style="justify-content:space-between"><h2>Contas mãe</h2><button class="btn" onclick="openBill('mom')">Nova conta mãe</button></div><p class="pill">Aberto: ${money(mom)}</p><div class="list">${data.momBills.map(b=>billItem(b,'mom')).join('')||'<p class="muted">Nenhuma conta da mãe.</p>'}</div></div><div class="card span12"><div class="row" style="justify-content:space-between"><h2>Notas financeiras</h2><button class="btn soft" onclick="openNote('Financeiro')">Nova nota</button></div><div class="grid">${data.notes.filter(n=>n.tag=='Financeiro').map(n=>`<div class="span4 noteBlock"><b>${safe(n.title)}</b><p>${safe(n.text)}</p></div>`).join('')||'<p class="muted">Nenhuma nota financeira.</p>'}</div></div></div>`}
function payBill(id,type){let arr=type=='mom'?data.momBills:data.bills;let b=arr.find(x=>x.id==id);b.paid=!b.paid;b.paidDate=b.paid?iso(today):'';render(); if(b.paid) openWhats(type,b)} function delBill(id,type){let arr=type=='mom'?data.momBills:data.bills; if(type=='mom')data.momBills=arr.filter(b=>b.id!=id);else data.bills=arr.filter(b=>b.id!=id);render()}
function petMini(p){return `<div class="item petCard"><div class="left"><div class="avatar">${p.photo?`<img src="${p.photo}">`:'🐶'}</div><div><b>${safe(p.name)}</b><div class="muted">${safe(p.sex||'')} ${p.sex?'•':''} ${safe(p.species||'')}</div></div></div><button class="btn soft" onclick="activePetId=${p.id};go('pets')">Abrir</button></div>`}
function pets(){if(!activePetId&&data.pets[0])activePetId=data.pets[0].id;let p=data.pets.find(x=>x.id==activePetId); if(!p)return `<div class="card"><h2>Pets</h2><button class="btn" onclick="openPet()">Cadastrar pet</button></div>`;return `<div class="row" style="margin-bottom:16px"><button class="btn" onclick="openPet()">Novo pet</button>${data.pets.map(x=>`<button class="tab ${x.id==activePetId?'active':''}" onclick="activePetId=${x.id};render()">${safe(x.name)}</button>`).join('')}</div><div class="card petHero"><div class="avatar">${p.photo?`<img src="${p.photo}">`:'🐶'}</div><h2 style="font-size:36px;margin:12px 0 4px">${safe(p.name)}</h2><p class="muted">${safe(p.sex||'')} ${p.sex?'•':''} ${safe(p.species||'')} ${p.weight?'• '+safe(p.weight):''}</p><button class="btn soft" onclick="openPet(${p.id})">Editar</button></div><div class="tabs" style="margin:18px 0">${[['saude','Saúde'],['rotinas','Rotinas'],['produtos','Produtos'],['gastos','Gastos'],['fotos','Fotos'],['notas','Notas']].map(t=>`<button class="tab ${petTab==t[0]?'active':''}" onclick="petTab='${t[0]}';render()">${t[1]}</button>`).join('')}</div>${petTabHtml(p)}`}
function petTabHtml(p){let ev=p.events||[]; if(petTab=='saude')return `<div class="card"><div class="row" style="justify-content:space-between"><h2>Saúde, consultas e exames</h2><button class="btn" onclick="openPetEvent(${p.id})">Adicionar</button></div><div class="list">${ev.map(e=>`<div class="item"><div><b>${safe(e.type)}: ${safe(e.title)}</b><div class="muted">${safe(e.date||'')} ${e.value? '• '+money(e.value):''}</div><p>${safe(e.obs||'')}</p></div></div>`).join('')||'<p class="muted">Nenhum registro.</p>'}</div></div>`; if(petTab=='rotinas')return `<div class="card"><h2>Rotinas</h2><div class="list">${['Escovar dentes','Limpar ouvido','Passear','Cortar unhas','Dar medicamento','Banho'].map(x=>`<div class="item"><b>${x}</b><button class="btn soft" onclick="openPetEvent(${p.id},'${x}')">Agendar</button></div>`).join('')}</div></div>`; if(petTab=='produtos')return `<div class="card"><h2>Produtos e alimentação</h2><p><b>Ração:</b> ${safe(p.food||'Não informado')}</p><button class="btn soft" onclick="openPet(${p.id})">Editar alimentação</button></div>`; if(petTab=='gastos')return `<div class="card"><h2>Gastos do pet</h2><p class="big">${money(ev.reduce((s,e)=>s+Number(e.value||0),0))}</p></div>`; if(petTab=='fotos')return `<div class="card"><div class="row" style="justify-content:space-between"><h2>Fotos</h2><button class="btn soft" onclick="openPet(${p.id})">Adicionar foto de perfil</button></div><div class="grid">${(p.album||[]).map(img=>`<div class="span3"><img src="${img}" style="width:100%;border-radius:22px"></div>`).join('')||'<p class="muted">Álbum vazio.</p>'}</div></div>`; return `<div class="card"><h2>Notas do pet</h2><textarea onchange="let p=data.pets.find(x=>x.id==${p.id});p.notes=cap(this.value);render()">${safe(p.notes||'')}</textarea></div>`}
function healthPerson(){return data.health.people.find(p=>p.id==activeHealthId)||data.health.people[0]}
function healthItem(r){return `<div class="item"><div><b>${safe(r.type)}: ${safe(r.title)}</b><div class="muted">${safe(r.date||'Sem data')} ${r.time?'• '+safe(r.time):''} • ${safe((data.health.people.find(p=>p.id==r.personId)||{}).name||'')}</div><p>${safe(r.notes||'')}</p></div><div class="row"><button class="btn soft" onclick="openHealth(${r.id})">Editar</button><button class="btn soft" onclick="delHealth(${r.id})">Excluir</button></div></div>`}
function saude(){let hp=healthPerson();let all=data.health.records.filter(r=>r.personId==hp.id);let filtered=all.filter(r=>healthTab=='agenda'?['Consulta','Exame','Atestado/Laudo','Documento'].includes(r.type):healthTab=='meds'?r.type=='Medicamento':healthTab=='ciclo'?r.type=='Menstruação':['Sintoma','Peso/Medida','Nota','Outro'].includes(r.type));return `<div class="row" style="margin-bottom:16px">${data.health.people.map(p=>`<button class="tab ${activeHealthId==p.id?'active':''}" onclick="activeHealthId=${p.id};render()">${safe(p.name)}</button>`).join('')}<button class="btn soft" onclick="openHealthPerson(${hp.id})">Editar pessoa</button></div><div class="card petHero"><h2 style="font-size:36px;margin:0">❤️ ${safe(hp.name)}</h2><p class="muted">${safe(hp.type||'')}</p><button class="btn" onclick="openHealth(null,'Consulta')">Nova consulta/exame</button> <button class="btn soft" onclick="openHealth(null,'Medicamento')">Medicamento</button> ${hp.type=='Eu'?'<button class="btn soft" onclick="openHealth(null,\'Menstruação\')">Menstruação</button>':''}</div><div class="tabs" style="margin:18px 0">${[['agenda','Consultas/Exames'],['meds','Medicamentos'],['ciclo','Menstruação'],['notas','Sintomas/Notas']].map(t=>`<button class="tab ${healthTab==t[0]?'active':''}" onclick="healthTab='${t[0]}';render()">${t[1]}</button>`).join('')}</div><div class="grid"><div class="card span8"><div class="row" style="justify-content:space-between"><h2>${healthTab=='agenda'?'Consultas, exames e documentos':healthTab=='meds'?'Medicamentos':healthTab=='ciclo'?'Menstruação':'Sintomas, medidas e notas'}</h2><button class="btn" onclick="openHealth(null,'${healthTab=='meds'?'Medicamento':healthTab=='ciclo'?'Menstruação':'Consulta'}')">Adicionar</button></div><div class="list">${filtered.map(healthItem).join('')||'<p class="muted">Nenhum registro.</p>'}</div></div><div class="card span4"><h2>Notas gerais</h2><textarea onchange="let p=data.health.people.find(x=>x.id==${hp.id});p.notes=cap(this.value);render()">${safe(hp.notes||'')}</textarea></div></div>`}
function reclamacoes(){let C=data.complaints, cases=C.cases;return `<div class="card"><div class="row" style="justify-content:space-between"><div><h2>⚖️ Reclamações</h2><p class="muted">ReclamaPro dentro do VITA.</p></div><button class="btn" onclick="openComplaintCase()">Nova reclamação</button></div><div class="tabs">${[['painel','Painel'],['pessoas','Pessoas'],['casos','Reclamações'],['linha','Linha do tempo'],['provas','Provas'],['portais','Portais'],['ata','Gerar ata']].map(t=>`<button class="tab ${complaintTab==t[0]?'active':''}" onclick="complaintTab='${t[0]}';render()">${t[1]}</button>`).join('')}</div></div>${complaintBody()}`}
function cpPerson(id){return data.complaints.people.find(p=>p.id==id)||{nome:'Sem titular'}}
function cpCase(id){return data.complaints.cases.find(c=>c.id==id)}
function complaintBody(){let C=data.complaints;if(complaintTab=='painel')return `<div class="grid"><div class="card span3"><div class="kicker">Reclamações</div><div class="big">${C.cases.length}</div></div><div class="card span3"><div class="kicker">Abertas</div><div class="big">${C.cases.filter(c=>c.status!='Resolvido').length}</div></div><div class="card span3"><div class="kicker">Resolvidas</div><div class="big">${C.cases.filter(c=>c.status=='Resolvido').length}</div></div><div class="card span3"><div class="kicker">Valor em disputa</div><div class="big">${money(C.cases.reduce((s,c)=>s+Number(c.valor||0),0))}</div></div><div class="card span12"><h2>Recentes</h2><div class="list">${C.cases.map(caseItem).join('')}</div></div></div>`;if(complaintTab=='pessoas')return `<div class="card"><div class="row" style="justify-content:space-between"><h2>Pessoas</h2><button class="btn" onclick="openComplaintPerson()">Adicionar pessoa</button></div><div class="list">${C.people.map(p=>`<div class="item"><div><b>${safe(p.nome)}</b><div class="muted">${safe(p.vinculo||'')} • ${safe(p.telefone||'sem WhatsApp')} • ${safe(p.doc||'sem documento')}</div></div><button class="btn soft" onclick="openComplaintPerson(${p.id})">Editar</button></div>`).join('')}</div></div>`;if(complaintTab=='casos')return `<div class="card"><div class="row" style="justify-content:space-between"><h2>Reclamações</h2><button class="btn" onclick="openComplaintCase()">Nova reclamação</button></div><div class="list">${C.cases.map(caseItem).join('')}</div></div>`;if(complaintTab=='linha')return `<div class="card"><div class="row" style="justify-content:space-between"><h2>Linha do tempo</h2><button class="btn" onclick="openComplaintEvent()">Adicionar evento</button></div><div class="list">${C.events.map(e=>`<div class="item"><div><b>${safe(e.data)} — ${safe(e.titulo)}</b><div class="muted">${safe((cpCase(e.caseId)||{}).empresa||'')}</div><p>${safe(e.desc||'')}</p></div></div>`).join('')||'<p class="muted">Nenhum evento.</p>'}</div></div>`;if(complaintTab=='provas')return `<div class="card"><div class="row" style="justify-content:space-between"><h2>Provas e anexos</h2><button class="btn" onclick="openEvidence()">Adicionar prova</button></div><div class="list">${C.evidence.map(a=>`<div class="item"><div><b>${safe(a.nome)}</b><div class="muted">${safe(a.tipo)} • ${safe((cpCase(a.caseId)||{}).empresa||'')} • ${safe(a.link||'arquivo local')}</div></div><button class="btn soft" onclick="data.complaints.evidence=data.complaints.evidence.filter(x=>x.id!=${a.id});render()">Excluir</button></div>`).join('')||'<p class="muted">Nenhuma prova.</p>'}</div></div>`;if(complaintTab=='portais')return `<div class="card"><div class="row" style="justify-content:space-between"><h2>Portais</h2><button class="btn" onclick="openPortal()">Vincular portal</button></div><div class="grid"><div class="item span3"><b>Reclame Aqui</b></div><div class="item span3"><b>BACEN</b></div><div class="item span3"><b>Consumidor.gov</b></div><div class="item span3"><b>PROCON</b></div></div><h3>Portais salvos</h3><div class="list">${C.portals.map(p=>`<div class="item"><div><b>${safe(p.nome)}</b><div class="muted">${safe((cpCase(p.caseId)||{}).empresa||'')} • ${safe(p.status||'')} • ${safe(p.protocolo||'')}</div><p>${safe(p.resposta||'')}</p></div></div>`).join('')||'<p class="muted">Nenhum portal.</p>'}</div></div>`;return `<div class="card"><h2>Gerar ata</h2><div class="field"><label>Reclamação</label><select id="ataCase">${C.cases.map(c=>`<option value="${c.id}">${safe(c.empresa)} — ${safe(c.assunto)}</option>`).join('')}</select></div><button class="btn" onclick="generateAta()">Gerar ata</button> <button class="btn soft" onclick="navigator.clipboard.writeText(document.getElementById('ataText').textContent);alert('Ata copiada!')">Copiar</button><div class="ata" id="ataText" style="margin-top:16px">Escolha a reclamação e clique em gerar ata.</div></div>`}
function caseItem(c){return `<div class="item"><div><b>${safe(c.empresa)}</b> — ${safe(c.assunto)}<div class="muted">${safe(cpPerson(c.titularId).nome)} • ${safe(c.portal)} • ${safe(c.status)} • ${money(c.valor)}</div><p>${safe(c.resumo||'')}</p></div><div class="row"><button class="btn soft" onclick="openComplaintCase(${c.id})">Editar</button><button class="btn soft" onclick="delComplaintCase(${c.id})">Excluir</button></div></div>`}
function notas(){return `<div class="card"><div class="row" style="justify-content:space-between"><h2>Notas em bloquinhos</h2><button class="btn" onclick="openNote()">Nova nota</button></div><div class="grid">${data.notes.map(n=>`<div class="span4 noteBlock"><b>${safe(n.title)}</b><div class="muted">${safe(n.tag||'Geral')}</div><p>${safe(n.text)}</p></div>`).join('')}</div></div>`}
function arquivos(){return `<div class="card"><h2>Arquivos</h2><p class="muted">Nesta versão de teste os arquivos ficam como referência. Na versão Supabase entra upload real de PDF/fotos.</p></div>`}
function relatorios(){let total=[...data.bills,...data.momBills].reduce((s,b)=>s+Number(b.value||0),0);return `<div class="grid"><div class="card span4"><div class="kicker">Total de contas cadastradas</div><div class="big">${money(total)}</div></div><div class="card span4"><div class="kicker">Pendências concluídas</div><div class="big">${data.tasks.filter(t=>t.done).length}</div></div><div class="card span4"><div class="kicker">Registros pets</div><div class="big">${data.pets.flatMap(p=>p.events||[]).length}</div></div><div class="card span4"><div class="kicker">Registros de saúde</div><div class="big">${data.health.records.length}</div></div><div class="card span4"><div class="kicker">Reclamações</div><div class="big">${data.complaints.cases.length}</div></div></div>`}
function config(){return `<div class="grid"><div class="card span6"><h2>Temas</h2><div class="themePick">${[['lavanda','Lavanda'],['cafe','Café'],['areia','Areia'],['salvia','Sálvia'],['neve','Neve'],['escuro','Escuro']].map(t=>`<button class="themeBtn" onclick="data.theme='${t[0]}';render()">${data.theme==t[0]?'✓ ':''}${t[1]}</button>`).join('')}</div></div><div class="card span6"><h2>Preferências</h2><label class="item"><span><b>Maiúscula automática</b><br><span class="muted">Início de frase e depois de ponto/enter.</span></span><input type="checkbox" ${data.settings.caps?'checked':''} onchange="data.settings.caps=this.checked;render()"></label><div class="field"><label>WhatsApp marido</label><input type="text" value="${safe(data.settings.whatsHusband||'')}" onchange="data.settings.whatsHusband=this.value;render()"></div><div class="field"><label>WhatsApp mãe</label><input type="text" value="${safe(data.settings.whatsMom||'')}" onchange="data.settings.whatsMom=this.value;render()"></div></div></div>`}
function openModal(title,body){modalTitle.textContent=title;modalBody.innerHTML=body;modal.classList.add('open');bindCaps(modalBody)} function closeModal(){modal.classList.remove('open')}
function openQuick(){openModal('Adicionar',`<div class="grid"><button class="btn span4" onclick="openTask()">Nova pendência</button><button class="btn span4" onclick="openBill('me')">Nova conta</button><button class="btn span4" onclick="openBill('mom')">Conta mãe</button><button class="btn span4" onclick="openPet()">Novo pet</button><button class="btn span4" onclick="openHealth()">Saúde</button><button class="btn span4" onclick="openComplaintCase()">Reclamação</button><button class="btn span4" onclick="openNote()">Nova nota</button></div>`)}
function openTask(date=''){openModal('Nova pendência',`<div class="field"><label>Título</label><input id="tTitle" type="text"></div><div class="field"><label>Data</label><input id="tDate" type="date" value="${date}"></div><div class="field"><label>Categoria</label><input id="tCat" type="text" value="Pessoal"></div><button class="btn" onclick="data.tasks.push({id:Date.now(),title:cap(tTitle.value),date:tDate.value,cat:cap(tCat.value),done:false});closeModal();render()">Salvar</button>`)}
function openBill(type){openModal(type=='mom'?'Nova conta mãe':'Nova conta',`<div class="field"><label>Nome</label><input id="bName" type="text"></div><div class="field"><label>Valor</label><input id="bValue" type="number" step="0.01"></div><div class="field"><label>Vencimento</label><input id="bDue" type="date"></div><div class="field"><label>Observações</label><textarea id="bObs"></textarea></div><button class="btn" onclick="let b={id:Date.now(),name:cap(bName.value),value:bValue.value,due:bDue.value,obs:cap(bObs.value),paid:false};( '${type}'=='mom'?data.momBills:data.bills).push(b);closeModal();render()">Salvar</button>`)}
function openNote(tag='Geral'){openModal('Nova nota',`<div class="field"><label>Título</label><input id="nTitle" type="text"></div><div class="field"><label>Tag</label><input id="nTag" type="text" value="${tag}"></div><div class="field"><label>Texto</label><textarea id="nText"></textarea></div><button class="btn" onclick="data.notes.push({id:Date.now(),title:cap(nTitle.value),tag:cap(nTag.value),text:cap(nText.value)});closeModal();render()">Salvar</button>`)}
function openPet(id){let p=id?data.pets.find(x=>x.id==id):{id:Date.now(),name:'',species:'Cachorro',sex:'',birth:'',weight:'',food:'',vet:'',photo:'',notes:'',events:[],album:[]};openModal(id?'Editar pet':'Cadastrar pet',`<div class="row"><div class="avatar" id="photoPrev">${p.photo?`<img src="${p.photo}">`:'🐶'}</div><div style="flex:1"><div class="field"><label>Foto do pet</label><input id="pPhoto" type="file" accept="image/*"></div><button class="btn soft" onclick="window.petPhoto='';photoPrev.innerHTML='🐶'">Remover foto</button></div></div><div class="grid"><div class="field span6"><label>Nome</label><input id="pName" type="text" value="${safe(p.name)}"></div><div class="field span6"><label>Espécie</label><select id="pSpecies"><option ${p.species=='Cachorro'?'selected':''}>Cachorro</option><option ${p.species=='Gato'?'selected':''}>Gato</option><option ${p.species=='Outro'?'selected':''}>Outro</option></select></div><div class="field span4"><label>Sexo</label><input id="pSex" type="text" value="${safe(p.sex||'')}"></div><div class="field span4"><label>Peso</label><input id="pWeight" type="text" value="${safe(p.weight||'')}"></div><div class="field span4"><label>Nascimento</label><input id="pBirth" type="date" value="${safe(p.birth||'')}"></div><div class="field span6"><label>Ração / alimentação</label><input id="pFood" type="text" value="${safe(p.food||'')}"></div><div class="field span6"><label>Veterinário / clínica</label><input id="pVet" type="text" value="${safe(p.vet||'')}"></div><div class="field span12"><label>Notas</label><textarea id="pNotes">${safe(p.notes||'')}</textarea></div></div><button class="btn" onclick="savePet(${p.id},${id?1:0})">Salvar pet</button>`); window.petPhoto=p.photo||''; pPhoto.onchange=e=>resizeImage(e.target.files[0],img=>{window.petPhoto=img;photoPrev.innerHTML='<img src="'+img+'">'});}
function resizeImage(file,cb){if(!file)return;let r=new FileReader();r.onload=e=>{let img=new Image();img.onload=()=>{let c=document.createElement('canvas'),max=600,scale=Math.min(max/img.width,max/img.height,1);c.width=img.width*scale;c.height=img.height*scale;c.getContext('2d').drawImage(img,0,0,c.width,c.height);cb(c.toDataURL('image/jpeg',.82))};img.src=e.target.result};r.readAsDataURL(file)}
function savePet(id,edit){let p=edit?data.pets.find(x=>x.id==id):{id,events:[],album:[]};Object.assign(p,{name:cap(pName.value)||'Sem nome',species:pSpecies.value,sex:cap(pSex.value),birth:pBirth.value,weight:pWeight.value,food:cap(pFood.value),vet:cap(pVet.value),notes:cap(pNotes.value),photo:window.petPhoto||''});if(!edit)data.pets.push(p);activePetId=p.id;closeModal();render()}
function openPetEvent(petId,preset=''){openModal('Registro do pet',`<div class="field"><label>Tipo</label><select id="eType"><option>Consulta</option><option>Exame</option><option>Vacina</option><option>Medicamento</option><option>Banho</option><option>Antipulgas</option><option>Vermífugo</option><option>Rotina</option><option>Outro</option></select></div><div class="field"><label>Título</label><input id="eTitle" type="text" value="${safe(preset)}"></div><div class="field"><label>Data</label><input id="eDate" type="date"></div><div class="field"><label>Valor</label><input id="eValue" type="number" step="0.01"></div><div class="field"><label>Observações</label><textarea id="eObs"></textarea></div><button class="btn" onclick="let p=data.pets.find(x=>x.id==${petId});let ev={id:Date.now(),type:eType.value,title:cap(eTitle.value),date:eDate.value,value:eValue.value,obs:cap(eObs.value)};p.events.push(ev); if(eDate.value)data.tasks.push({id:Date.now()+1,title:cap(eType.value+' '+p.name+' - '+eTitle.value),date:eDate.value,cat:'Pets',done:false}); if(eValue.value)data.bills.push({id:Date.now()+2,name:cap(eType.value+' '+p.name),value:eValue.value,due:eDate.value,obs:'Gerado pelo módulo Pets',paid:false}); closeModal();render()">Salvar e integrar</button>`)}
function openDay(date){let dayTasks=data.tasks.filter(t=>t.date==date), dayHealth=data.health.records.filter(r=>r.date==date);openModal('Dia '+date,`<button class="btn" onclick="openTask('${date}')">Nova pendência neste dia</button><hr><div class="list">${dayTasks.map(taskItem).join('')}${dayHealth.map(healthItem).join('')||''}${(!dayTasks.length&&!dayHealth.length)?'<p class="muted">Nada neste dia.</p>':''}</div>`)}
function openHealth(rid,type='Consulta'){let r=rid?data.health.records.find(x=>x.id==rid):{id:Date.now(),personId:activeHealthId,type,title:'',date:'',time:'',professional:'',value:0,notes:'',file:''};openModal(rid?'Editar saúde':'Novo registro de saúde',`<div class="grid"><div class="field span6"><label>Pessoa</label><select id="hPerson">${data.health.people.map(p=>`<option value="${p.id}" ${r.personId==p.id?'selected':''}>${safe(p.name)}</option>`).join('')}</select></div><div class="field span6"><label>Tipo</label><select id="hType">${['Consulta','Exame','Medicamento','Menstruação','Atestado/Laudo','Documento','Sintoma','Peso/Medida','Nota','Outro'].map(x=>`<option ${r.type==x||(!rid&&type==x)?'selected':''}>${x}</option>`).join('')}</select></div><div class="field span6"><label>Título</label><input id="hTitle" type="text" value="${safe(r.title||'')}"></div><div class="field span3"><label>Data</label><input id="hDate" type="date" value="${safe(r.date||'')}"></div><div class="field span3"><label>Hora</label><input id="hTime" type="time" value="${safe(r.time||'')}"></div><div class="field span6"><label>Médico / clínica / dosagem / ciclo</label><input id="hProf" type="text" value="${safe(r.professional||'')}"></div><div class="field span6"><label>Valor</label><input id="hValue" type="number" step="0.01" value="${safe(r.value||0)}"></div><div class="field span12"><label>Arquivo / referência</label><input id="hFile" type="text" value="${safe(r.file||'')}"></div><div class="field span12"><label>Notas</label><textarea id="hNotes">${safe(r.notes||'')}</textarea></div></div><button class="btn" onclick="saveHealth(${r.id},${rid?1:0})">Salvar</button>`)}
function saveHealth(id,edit){let o={id,personId:Number(hPerson.value),type:hType.value,title:cap(hTitle.value),date:hDate.value,time:hTime.value,professional:cap(hProf.value),value:Number(hValue.value||0),notes:cap(hNotes.value),file:cap(hFile.value)};if(edit){data.health.records[data.health.records.findIndex(r=>r.id==id)]=o}else{data.health.records.unshift(o);if(o.date){data.tasks.push({id:Date.now()+1,title:cap(`${o.type} ${(data.health.people.find(p=>p.id==o.personId)||{}).name||''} - ${o.title}`),date:o.date,cat:'Saúde',done:false})}}activeHealthId=o.personId;closeModal();render()} function delHealth(id){data.health.records=data.health.records.filter(r=>r.id!=id);render()}
function openHealthPerson(id){let p=data.health.people.find(x=>x.id==id);openModal('Editar pessoa da saúde',`<div class="field"><label>Nome</label><input id="hpName" type="text" value="${safe(p.name)}"></div><div class="field"><label>Tipo</label><input id="hpType" type="text" value="${safe(p.type)}"></div><button class="btn" onclick="let p=data.health.people.find(x=>x.id==${id});p.name=cap(hpName.value);p.type=cap(hpType.value);closeModal();render()">Salvar</button>`)}
function openComplaintPerson(id){let p=id?data.complaints.people.find(x=>x.id==id):{id:Date.now(),nome:'',vinculo:'',telefone:'',doc:''};openModal(id?'Editar pessoa':'Adicionar pessoa',`<div class="field"><label>Nome</label><input id="cpNome" type="text" value="${safe(p.nome)}"></div><div class="field"><label>Vínculo</label><input id="cpVinc" type="text" value="${safe(p.vinculo)}"></div><div class="field"><label>WhatsApp</label><input id="cpTel" type="text" value="${safe(p.telefone)}"></div><div class="field"><label>Documento</label><input id="cpDoc" type="text" value="${safe(p.doc)}"></div><button class="btn" onclick="saveComplaintPerson(${p.id},${id?1:0})">Salvar</button>`)}
function saveComplaintPerson(id,edit){let o={id,nome:cap(cpNome.value),vinculo:cap(cpVinc.value),telefone:cpTel.value,doc:cpDoc.value};if(edit)data.complaints.people[data.complaints.people.findIndex(p=>p.id==id)]=o;else data.complaints.people.push(o);closeModal();render()}
function openComplaintCase(id){let c=id?data.complaints.cases.find(x=>x.id==id):{id:Date.now(),titularId:data.complaints.people[0]?.id,empresa:'',assunto:'',portal:'Reclame Aqui',status:'Aguardando',prazo:'',valor:0,data:'',protocolo:'',resumo:''};openModal(id?'Editar reclamação':'Nova reclamação',`<div class="grid"><div class="field span6"><label>Titular</label><select id="ccTitular">${data.complaints.people.map(p=>`<option value="${p.id}" ${c.titularId==p.id?'selected':''}>${safe(p.nome)}</option>`).join('')}</select></div><div class="field span6"><label>Empresa</label><input id="ccEmpresa" type="text" value="${safe(c.empresa)}"></div><div class="field span6"><label>Assunto</label><input id="ccAssunto" type="text" value="${safe(c.assunto)}"></div><div class="field span6"><label>Portal</label><select id="ccPortal">${['Reclame Aqui','Bacen','Consumidor.gov','Procon','Interno'].map(x=>`<option ${c.portal==x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field span6"><label>Status</label><select id="ccStatus">${['Aguardando','Para reclamar','Respondido','Resolvido'].map(x=>`<option ${c.status==x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field span6"><label>Prazo</label><input id="ccPrazo" type="text" value="${safe(c.prazo)}"></div><div class="field span6"><label>Valor</label><input id="ccValor" type="number" step="0.01" value="${safe(c.valor)}"></div><div class="field span6"><label>Data do problema</label><input id="ccData" type="date" value="${safe(c.data)}"></div><div class="field span12"><label>Protocolo</label><input id="ccProt" type="text" value="${safe(c.protocolo)}"></div><div class="field span12"><label>Resumo</label><textarea id="ccResumo">${safe(c.resumo)}</textarea></div></div><button class="btn" onclick="saveComplaintCase(${c.id},${id?1:0})">Salvar reclamação</button>`)}
function saveComplaintCase(id,edit){let o={id,titularId:Number(ccTitular.value),empresa:cap(ccEmpresa.value),assunto:cap(ccAssunto.value),portal:ccPortal.value,status:ccStatus.value,prazo:cap(ccPrazo.value),valor:Number(ccValor.value||0),data:ccData.value,protocolo:ccProt.value,resumo:cap(ccResumo.value)};if(edit)data.complaints.cases[data.complaints.cases.findIndex(c=>c.id==id)]=o;else{data.complaints.cases.unshift(o);data.complaints.events.unshift({id:Date.now()+1,caseId:id,data:iso(today),titulo:'Reclamação cadastrada',desc:'Caso criado dentro do VITA.'})}closeModal();render()} function delComplaintCase(id){if(confirm('Excluir reclamação?')){data.complaints.cases=data.complaints.cases.filter(c=>c.id!=id);data.complaints.events=data.complaints.events.filter(e=>e.caseId!=id);data.complaints.evidence=data.complaints.evidence.filter(a=>a.caseId!=id);data.complaints.portals=data.complaints.portals.filter(p=>p.caseId!=id);render()}}
function openComplaintEvent(){openModal('Adicionar evento',`<div class="field"><label>Reclamação</label><select id="ceCase">${data.complaints.cases.map(c=>`<option value="${c.id}">${safe(c.empresa)} — ${safe(c.assunto)}</option>`).join('')}</select></div><div class="field"><label>Data</label><input id="ceData" type="date" value="${iso(today)}"></div><div class="field"><label>Título</label><input id="ceTitulo" type="text"></div><div class="field"><label>Descrição</label><textarea id="ceDesc"></textarea></div><button class="btn" onclick="data.complaints.events.unshift({id:Date.now(),caseId:Number(ceCase.value),data:ceData.value,titulo:cap(ceTitulo.value),desc:cap(ceDesc.value)});closeModal();render()">Salvar evento</button>`)}
function openEvidence(){openModal('Adicionar prova',`<div class="field"><label>Reclamação</label><select id="evCase">${data.complaints.cases.map(c=>`<option value="${c.id}">${safe(c.empresa)} — ${safe(c.assunto)}</option>`).join('')}</select></div><div class="field"><label>Tipo</label><select id="evTipo"><option>Print</option><option>PDF</option><option>Vídeo</option><option>Áudio</option><option>Comprovante</option><option>Contrato</option><option>Outro</option></select></div><div class="field"><label>Nome</label><input id="evNome" type="text"></div><div class="field"><label>Arquivo</label><input id="evFile" type="file"></div><div class="field"><label>Link/referência</label><input id="evLink" type="text"></div><button class="btn" onclick="let f=evFile.files[0];data.complaints.evidence.unshift({id:Date.now(),caseId:Number(evCase.value),tipo:evTipo.value,nome:cap(evNome.value||f?.name||'Prova'),link:evLink.value||f?.name||'Arquivo local'});closeModal();render()">Salvar prova</button>`)}
function openPortal(){openModal('Vincular portal',`<div class="field"><label>Reclamação</label><select id="poCase">${data.complaints.cases.map(c=>`<option value="${c.id}">${safe(c.empresa)} — ${safe(c.assunto)}</option>`).join('')}</select></div><div class="field"><label>Portal</label><select id="poNome"><option>Reclame Aqui</option><option>Bacen</option><option>Consumidor.gov</option><option>Procon</option><option>Interno</option></select></div><div class="field"><label>Status</label><input id="poStatus" type="text"></div><div class="field"><label>Protocolo</label><input id="poProt" type="text"></div><div class="field"><label>Resposta/observação</label><textarea id="poResp"></textarea></div><button class="btn" onclick="data.complaints.portals.unshift({id:Date.now(),caseId:Number(poCase.value),nome:poNome.value,status:cap(poStatus.value),protocolo:poProt.value,resposta:cap(poResp.value)});closeModal();render()">Salvar portal</button>`)}
function generateAta(){let c=cpCase(Number(ataCase.value));if(!c)return;let p=cpPerson(c.titularId);let ev=data.complaints.events.filter(e=>e.caseId==c.id).map(e=>`- ${e.data}: ${e.titulo}. ${e.desc}`).join('\n')||'Não informada.';let an=data.complaints.evidence.filter(a=>a.caseId==c.id).map(a=>`- ${a.tipo}: ${a.nome} (${a.link})`).join('\n')||'Não informado.';ataText.textContent=`RELATÓRIO / ATA DE RECLAMAÇÃO\n\nTitular: ${p.nome}\nDocumento: ${p.doc||'não informado'}\nEmpresa reclamada: ${c.empresa}\nAssunto: ${c.assunto}\nPortal principal: ${c.portal}\nStatus atual: ${c.status}\nPrazo: ${c.prazo||'não informado'}\nValor reclamado: ${money(c.valor)}\nProtocolo principal: ${c.protocolo||'não informado'}\n\nResumo do problema:\n${c.resumo||'Não informado.'}\n\nLinha do tempo:\n${ev}\n\nProvas e anexos:\n${an}\n\nPedido final:\nSolicita-se análise do caso, regularização da situação, resposta formal da empresa e eventual devolução/indenização, conforme provas anexadas.`}
function openWhats(type,b){let phone=type=='mom'?data.settings.whatsMom:data.settings.whatsHusband;let msg=type=='mom'?`Olá, mãe! A conta ${b.name} foi paga. Valor: ${money(b.value)}. Data do pagamento: ${b.paidDate}.`:`Conta paga: ${b.name}. Valor: ${money(b.value)}. Data: ${b.paidDate}.`; if(phone&&confirm('Abrir WhatsApp com mensagem pronta?')) window.open('https://wa.me/'+phone.replace(/\D/g,'')+'?text='+encodeURIComponent(msg),'_blank')}
function exportData(){let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='backup-vita.json';a.click()}
render();
</script>
